steps:
  # Build web image
  - name: "gcr.io/cloud-builders/docker"
    id: build-web
    args:
      - build
      - --tag
      - gcr.io/$PROJECT_ID/byteswarm-web:$SHORT_SHA
      - --tag
      - gcr.io/$PROJECT_ID/byteswarm-web:latest
      - --cache-from
      - gcr.io/$PROJECT_ID/byteswarm-web:latest
      - --file
      - packages/web/Dockerfile
      - packages/web

  # Build worker image
  - name: "gcr.io/cloud-builders/docker"
    id: build-worker
    args:
      - build
      - --tag
      - gcr.io/$PROJECT_ID/byteswarm-worker:$SHORT_SHA
      - --tag
      - gcr.io/$PROJECT_ID/byteswarm-worker:latest
      - --cache-from
      - gcr.io/$PROJECT_ID/byteswarm-worker:latest
      - --file
      - packages/worker/Dockerfile
      - packages/worker

  # Push web image
  - name: "gcr.io/cloud-builders/docker"
    id: push-web
    waitFor:
      - build-web
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/byteswarm-web

  # Push worker image
  - name: "gcr.io/cloud-builders/docker"
    id: push-worker
    waitFor:
      - build-worker
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/byteswarm-worker

  # Deploy web to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-web
    waitFor:
      - push-web
    entrypoint: gcloud
    args:
      - run
      - deploy
      - byteswarm-web
      - --image
      - gcr.io/$PROJECT_ID/byteswarm-web:$SHORT_SHA
      - --region
      - $_REGION
      - --platform
      - managed
      - --no-allow-unauthenticated
      - --port
      - "3000"

  # Deploy worker to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-worker
    waitFor:
      - push-worker
    entrypoint: gcloud
    args:
      - run
      - deploy
      - byteswarm-worker
      - --image
      - gcr.io/$PROJECT_ID/byteswarm-worker:$SHORT_SHA
      - --region
      - $_REGION
      - --platform
      - managed
      - --no-allow-unauthenticated
      - --port
      - "8080"

substitutions:
  _REGION: us-central1

images:
  - gcr.io/$PROJECT_ID/byteswarm-web:$SHORT_SHA
  - gcr.io/$PROJECT_ID/byteswarm-web:latest
  - gcr.io/$PROJECT_ID/byteswarm-worker:$SHORT_SHA
  - gcr.io/$PROJECT_ID/byteswarm-worker:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
