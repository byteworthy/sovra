apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: byteswarm-worker
  annotations:
    run.googleapis.com/ingress: internal
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 10
      timeoutSeconds: 3600
      securityContext:
        runAsNonRoot: true
      containers:
        - image: gcr.io/${PROJECT_ID}/byteswarm-worker:${VERSION}
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
          env:
            - name: GO_ENV
              value: production
            - name: HTTP_PORT
              value: "8080"
            - name: GRPC_PORT
              value: "50051"
            - name: AGENT_WORKSPACE_PATH
              value: /tmp/agent-workspace
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: byteswarm-secrets
                  key: DATABASE_URL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: byteswarm-secrets
                  key: OPENAI_API_KEY
            - name: BRAVE_SEARCH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: byteswarm-secrets
                  key: BRAVE_SEARCH_API_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 6
            periodSeconds: 5
