# Railway configuration for Sovra worker service
# NOTE: Configure the service root directory to the repo root in Railway dashboard

[build]
builder = "dockerfile"
dockerfilePath = "packages/worker/Dockerfile"

[deploy]
startCommand = "worker"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[deploy.watchPatterns]]
path = "packages/worker/**"

[[deploy.watchPatterns]]
path = "packages/shared/**"
