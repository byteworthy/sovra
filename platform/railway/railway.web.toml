# Railway configuration for Sovra web service
# NOTE: Configure the service root directory to the repo root in Railway dashboard

[build]
builder = "dockerfile"
dockerfilePath = "packages/web/Dockerfile"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[deploy.watchPatterns]]
path = "packages/web/**"

[[deploy.watchPatterns]]
path = "packages/shared/**"
