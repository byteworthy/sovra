# Prerequisite: run 'supabase start' before starting these services.
# The web and worker services connect to the local Supabase instance.
name: sovra-dev

services:
  web:
    build:
      context: ../packages/web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ../packages/web:/app
      - ../packages/shared:/shared
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_SUPABASE_URL=http://host.docker.internal:54321
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-your-anon-key}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build:
      context: ../packages/worker
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
      - "50051:50051"
      - "3001:3001"
      - "3002:3002"
    volumes:
      - ../packages/worker:/app
      - go-cache:/root/.cache/go
      - agent-workspace:/tmp/agent-workspace
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:54322/postgres
      - HTTP_PORT=8080
      - GRPC_PORT=50051
      - MCP_PORT=3001
      - SOCKETIO_PORT=3002
      - SOCKETIO_ALLOWED_ORIGINS=http://localhost:3000
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-dev-secret}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-}
      - GO_ENV=development
      - AGENT_WORKSPACE_PATH=/tmp/agent-workspace
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  go-cache:
  agent-workspace:
