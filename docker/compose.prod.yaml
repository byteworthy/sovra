name: sovra

services:
  web:
    image: sovra/web:${VERSION:-latest}
    build:
      context: ../packages/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL:-}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:-}
      - NEXT_PUBLIC_POSTHOG_KEY=${POSTHOG_KEY:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - NEXT_PUBLIC_WORKER_SOCKET_URL=${WORKER_SOCKET_URL:-http://worker:3002}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sovra

  worker:
    image: sovra/worker:${VERSION:-latest}
    build:
      context: ../packages/worker
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    expose:
      - "50051"
      - "3001"
      - "3002"
    volumes:
      - agent-workspace:/tmp/agent-workspace
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - HTTP_PORT=8080
      - GRPC_PORT=50051
      - MCP_PORT=3001
      - SOCKETIO_PORT=3002
      - SOCKETIO_ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://yourdomain.com}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - GO_ENV=production
      - AGENT_WORKSPACE_PATH=/tmp/agent-workspace
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - sovra
    depends_on:
      web:
        condition: service_started

networks:
  sovra:
    driver: bridge

volumes:
  agent-workspace:
