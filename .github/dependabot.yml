version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    cooldown:
      default-days: 3
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - javascript
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - patch
          - minor
      production-dependencies:
        dependency-type: production
        update-types:
          - patch
          - minor

  - package-ecosystem: gomod
    directory: "/packages/worker"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    cooldown:
      default-days: 3
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - go
      - worker

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - patch
          - minor

  - package-ecosystem: docker
    directory: "/packages/web"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: "/packages/worker"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
