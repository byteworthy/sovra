name: Bug report
description: Report a bug in Sovra.
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill out the sections below.
        Security issues: do not file here. See `SECURITY.md`.

  - type: input
    id: version
    attributes:
      label: Sovra version / commit SHA
      placeholder: "v1.0.0 or abc1234"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS:
        - Node version:
        - pnpm version:
        - Go version (if worker):
        - Browser (if UI):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Redact any secrets before pasting.
