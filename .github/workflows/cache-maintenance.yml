name: Cache Maintenance

on:
  schedule:
    - cron: "0 7 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prune-caches:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Prune stale Actions caches
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const keepRecent = 25;
            const perPage = 100;
            const caches = [];

            for (let page = 1; page <= 10; page++) {
              const response = await github.request(
                "GET /repos/{owner}/{repo}/actions/caches",
                { owner, repo, per_page: perPage, page }
              );
              const batch = response.data.actions_caches || [];
              caches.push(...batch);
              if (batch.length < perPage) break;
            }

            caches.sort((a, b) => {
              const aTime = Date.parse(a.last_accessed_at || a.created_at || 0);
              const bTime = Date.parse(b.last_accessed_at || b.created_at || 0);
              return bTime - aTime;
            });

            const toDelete = caches.slice(keepRecent);
            let removed = 0;
            let freed = 0;

            for (const cache of toDelete) {
              await github.request(
                "DELETE /repos/{owner}/{repo}/actions/caches/{cache_id}",
                { owner, repo, cache_id: cache.id }
              );
              removed++;
              freed += Number(cache.size_in_bytes || 0);
            }

            core.notice(
              `Pruned ${removed} cache entries, reclaimed ~${(freed / (1024 ** 3)).toFixed(2)} GB.`
            );
