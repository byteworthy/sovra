name: Maintenance Cadence

on:
  schedule:
    # Weekly health signal (Monday 14:00 UTC)
    - cron: "0 14 * * 1"
    # Monthly checklist issue (first day of month at 14:00 UTC)
    - cron: "0 14 1 * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  issues: write
  security-events: read

jobs:
  weekly-health-check:
    name: Weekly Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 14 * * 1'
    steps:
      - name: Evaluate repo health and open issue on failure
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const branch = "main"
            const workflows = ["CI", "Security", "Release Readiness", "Deploy"]

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              { owner, repo, branch, per_page: 100 }
            )

            const latestByWorkflow = Object.fromEntries(
              workflows.map((name) => [name, runs.find((r) => r.name === name)])
            )

            const problems = []
            for (const wf of workflows) {
              const run = latestByWorkflow[wf]
              if (!run) {
                problems.push(`Missing recent workflow run for \`${wf}\` on \`${branch}\`.`)
                continue
              }
              if (!(run.status === "completed" && run.conclusion === "success")) {
                problems.push(
                  `\`${wf}\` is \`${run.status}/${run.conclusion ?? "none"}\` (run: ${run.html_url}).`
                )
              }
            }

            const dependabotAlerts = await github.paginate(
              github.rest.dependabot.listAlertsForRepo,
              { owner, repo, state: "open", per_page: 100 }
            )
            if (dependabotAlerts.length > 0) {
              problems.push(`Open Dependabot alerts: **${dependabotAlerts.length}**.`)
            }

            const codeScanningAlerts = await github.paginate(
              github.rest.codeScanning.listAlertsForRepo,
              { owner, repo, state: "open", per_page: 100 }
            )
            if (codeScanningAlerts.length > 0) {
              problems.push(`Open code scanning alerts: **${codeScanningAlerts.length}**.`)
            }

            let secretScanningAlerts = []
            try {
              secretScanningAlerts = await github.paginate(
                "GET /repos/{owner}/{repo}/secret-scanning/alerts",
                { owner, repo, state: "open", per_page: 100 }
              )
            } catch (error) {
              if (error.status === 404) {
                problems.push("Secret scanning appears disabled or unavailable (API returned 404).")
              } else {
                throw error
              }
            }
            if (secretScanningAlerts.length > 0) {
              problems.push(`Open secret scanning alerts: **${secretScanningAlerts.length}**.`)
            }

            if (problems.length === 0) {
              core.info("Weekly health check passed; no issue created.")
              return
            }

            const title = "Weekly repo health check failed"
            const summary = [
              `Automated health check detected problems on ${new Date().toISOString().slice(0, 10)}.`,
              "",
              ...problems.map((p) => `- ${p}`),
              "",
              "Please address these items and close this issue.",
            ].join("\n")

            const openIssues = await github.paginate(
              github.rest.issues.listForRepo,
              { owner, repo, state: "open", per_page: 100 }
            )
            const existing = openIssues.find(
              (issue) => issue.title === title && !issue.pull_request
            )

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: summary,
              })
              core.info(`Updated existing issue #${existing.number}.`)
              return
            }

            const created = await github.rest.issues.create({
              owner,
              repo,
              title,
              body: summary,
            })
            core.info(`Created issue #${created.data.number}.`)

  monthly-maintenance-issue:
    name: Monthly Maintenance Checklist
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 14 1 * *'
    steps:
      - name: Open monthly checklist issue
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const month = new Date().toISOString().slice(0, 7)
            const title = `Monthly maintenance checklist - ${month}`

            const openIssues = await github.paginate(
              github.rest.issues.listForRepo,
              { owner, repo, state: "open", per_page: 100 }
            )
            const existing = openIssues.find(
              (issue) => issue.title === title && !issue.pull_request
            )
            if (existing) {
              core.info(`Checklist already exists: #${existing.number}`)
              return
            }

            const body = [
              "Automated monthly maintenance checklist:",
              "",
              "- [ ] Review open Dependabot PRs and merge safe updates",
              "- [ ] Confirm open alert counts are zero (Dependabot, code scanning, secret scanning)",
              "- [ ] Validate latest `main` workflow status (`CI`, `Security`, `Release Readiness`, `Deploy`)",
              "- [ ] Review CI logs for new deprecations or warnings",
              "- [ ] Run local validation (`pnpm lint`, `pnpm test`, `pnpm typecheck`, `pnpm go:test`)",
              "- [ ] Confirm README/docs links and setup instructions remain accurate",
              "",
              "_Opened automatically by the Maintenance Cadence workflow._",
            ].join("\n")

            const created = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            })
            core.info(`Created monthly checklist issue #${created.data.number}.`)
