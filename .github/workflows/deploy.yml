name: Deploy

on:
  push:
    branches:
      - master
      - main
    paths:
      - "packages/web/**"
      - "packages/shared/**"
      - "packages/worker/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/${{ github.repository }}/sovra-web
  WORKER_IMAGE: ghcr.io/${{ github.repository }}/sovra-worker

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build and push worker image
        uses: docker/build-push-action@v7
        with:
          context: packages/worker
          file: packages/worker/Dockerfile
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}:${{ github.sha }}
            ${{ env.WORKER_IMAGE }}:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Output image digests
        run: |
          echo "Web image: $WEB_IMAGE:${{ github.sha }}"
          echo "Worker image: $WORKER_IMAGE:${{ github.sha }}"
